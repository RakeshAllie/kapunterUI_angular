<section class="feature-shell">
  <div class="feature-card">
    <div class="section-head">
      <div>
        <h2>Dashboard Images</h2>
        <p>Manage slider images shown on home dashboard.</p>
      </div>
      <button class="btn siteBtnbackground">Upload New Image</button>
    </div>

    <div class="image-grid">
      <div class="image-item" *ngFor="let image of listImage_details">
        <div class="image-preview" [style.background-image]="'url(' + dashboardImagesPath + image.documentDetailId + image.fileExtenstion + ')'"
             [style.background-size]="'cover'"
             [style.background-position]="'center'">
        </div>
        <div class="image-meta">
          <h4>{{ image.imageName }}</h4>
          <p>{{ image.imageSize || 'Recommended size: 1280 x 520' }}</p>
          <div class="actions">
            <button class="btn btn-sm siteBtnbackground" (click)="setDefault(image.id)">Set Default</button>
            <button class="btn btn-sm siteBtnbackground" (click)="deleteImage(image.id)">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
